name: End of Day Self Review

on:
  schedule:
    # 21:30 UTC = אחרי סגירת וול סטריט (גם בשעון קיץ וגם בחורף)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  self-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run self review (הביקורת העצמית)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 self_review.py

      - name: Commit learning data
        run: |
          git config user.name "Stock Agents Bot"
          git config user.email "bot@stock-agents"
          git add data/
          git diff --staged --quiet || git commit -m "Self review $(date '+%Y-%m-%d'): results checked, weights updated"
          git pull --rebase origin main || true
          git push || echo "Push failed or nothing to push"
