name: Intraday Alerts

on:
  schedule:
    # כל 20 דקות בשעות המסחר של וול סטריט (13:40–19:40 UTC), ימי חול
    - cron: '0,20,40 14-19 * * 1-5'
    - cron: '40 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intraday:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intraday alerts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 intraday_alert.py

      - name: Commit alert state
        run: |
          git config user.name "Stock Agents Bot"
          git config user.email "bot@stock-agents"
          git add data/alerts_sent.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Intraday alerts $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase origin main || true
          git push || echo "Nothing to push"
